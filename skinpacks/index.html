      // Thumbnail cache: uuid -> url (resolved from ItemDetail JSON)
      const thumbCache = {};

      // Fetch one pack JSON and extract its thumbnail url
      async function fetchThumbUrl(uuid) {
        const entry = PACK_INDEX[uuid];
        if (!entry) return null;
        const base = PACKS_BASES[entry.category] ?? PACKS_BASES.skinpacks;
        const res = await fetch(base + entry.file);
        if (!res.ok) return null;
        const json = await res.json();
        const layout = json?.result?.layout;
        const rows = Array.isArray(layout)
          ? (layout.find((s) => s.sectionName === "rows")?.rows ?? [])
          : (json?.result?.rows ?? []);
        const summaryRow = rows.find((r) => r.controlId === "ItemSummary");
        const item = summaryRow?.components?.find(
          (c) => c.type === "itemSummaryComp",
        )?.item;
        return item?.thumbnail?.url ?? null;
      }

      // Pre-fetch all thumbnails in parallel before first render
      async function preloadThumbs() {
        const fetchable = PACKS.filter((p) => PACK_INDEX[p.uuid]);
        await Promise.allSettled(
          fetchable.map(async (pack) => {
            try {
              const url = await fetchThumbUrl(pack.uuid);
              if (url) thumbCache[pack.uuid] = url;
            } catch {}
          }),
        );
      }

      // Get resolved thumb url (falls back to banner)
      function getThumbUrl(pack) {
        return thumbCache[pack.uuid] ?? pack.banner;
      }

      // Apply thumbnail — always resolved by the time render is called
      function applyThumb(imgEl, pack) {
        imgEl.src = getThumbUrl(pack);
      }

      function buildFeatured() {
        const hero = FEATURED[0];
        const sides = FEATURED.slice(1, 5);
        const row = document.getElementById("mc-featured-row");
        const hasTrailer = !!hero.trailer;
        row.innerHTML = `
          <a class="mc-hero-card" href="/id/?pack=${hero.uuid}">
            <img id="thumb-hero" alt="${hero.name}" loading="lazy" onerror="this.style.display='none'" class="${hasTrailer ? "has-trailer" : ""}"/>
            ${hasTrailer ? `<iframe id="hero-trailer" class="mc-hero-trailer" src="" allow="autoplay" allowfullscreen="0" frameborder="0" tabindex="-1"></iframe>` : ""}
            ${hero.isNew ? '<span class="mc-new-badge">New</span>' : ""}
            <div class="mc-hero-label">
              <h2>${hero.name}</h2>
              <div class="mc-by">
                ${hero.label}
              </div>
              <div class="mc-rating">${starHTML(hero.rating)}</div>
            </div>
          </a>
          ${sides
            .map(
              (s, i) => `
            <a class="mc-side-card" href="/id/?pack=${s.uuid}">
              <img id="thumb-side-${i}" alt="${s.name}" loading="lazy" onerror="this.style.display='none'"/>
              <div class="mc-side-label">
                <div class="mc-side-label-left">
                  <h3>${s.name}</h3>
                  <div class="mc-rating">${starHTML(s.rating)}</div>
                </div>
                <div class="mc-side-label-right">
                  <span class="mc-price">${MINECOIN_SVG} ${s.price ?? 490}</span>
                </div>
              </div>
            </a>
          `,
            )
            .join("")}
        `;
        applyThumb(document.getElementById("thumb-hero"), hero);

        // Wire up trailer hover
        if (hasTrailer) {
          const heroCard = row.querySelector(".mc-hero-card");
          const trailer = document.getElementById("hero-trailer");
          const trailerSrc = `https://www.youtube.com/embed/${hero.trailer}?autoplay=1&mute=1&controls=0&loop=1&playlist=${hero.trailer}&modestbranding=1&showinfo=0&rel=0`;
          let loaded = false;
          heroCard.addEventListener("mouseenter", () => {
            if (!loaded) {
              trailer.src = trailerSrc;
              loaded = true;
            }
          });
          heroCard.addEventListener("mouseleave", () => {
            trailer.src = "";
            loaded = false;
          });
        }
        sides.forEach((s, i) =>
          applyThumb(document.getElementById(`thumb-side-${i}`), s),
        );
      }

      // ── Carousel
      function buildCarousel(packs) {
        const track = document.getElementById("carousel-track");
        track.innerHTML = "";
        packs.forEach((pack, idx) => {
          const a = document.createElement("a");
          a.className = "mc-small-card";
          a.href = `/id/?pack=${pack.uuid}`;
          const img = document.createElement("img");
          img.alt = pack.name;
          img.loading = "lazy";
          img.onerror = function () {
            this.style.display = "none";
          };
          a.innerHTML = `
            <div class="mc-small-footer">
              <h4>${pack.name}</h4>
              <div class="mc-by-small">${pack.creator || pack.category}</div>
            </div>`;
          a.insertBefore(img, a.firstChild);
          track.appendChild(a);
          applyThumb(img, pack);
        });
        updateCarousel();
      }

      function updateCarousel() {
        const track = document.getElementById("carousel-track");
        const cards = track.querySelectorAll(".mc-small-card");
        const total = cards.length;
        const pages = Math.ceil(total / CAROUSEL_PER_PAGE);
        carouselPage = Math.max(0, Math.min(carouselPage, pages - 1));
        const pct = carouselPage * 100;
        // Each card is 25% of track width (4 per page)
        track.style.transform = `translateX(-${carouselPage * (CAROUSEL_PER_PAGE * (100 / CAROUSEL_PER_PAGE))}%)`;
        // Use pixel offset instead
        const trackWrap = document.querySelector(".mc-carousel-track-wrap");
        if (trackWrap && cards.length > 0) {
          const cardW = trackWrap.offsetWidth / CAROUSEL_PER_PAGE;
          track.style.transform = `translateX(-${carouselPage * CAROUSEL_PER_PAGE * cardW}px)`;
        }
        document.getElementById("carousel-prev").disabled = carouselPage === 0;
        document.getElementById("carousel-next").disabled =
          carouselPage >= pages - 1;
      }

      document.getElementById("carousel-prev").addEventListener("click", () => {
        carouselPage--;
        updateCarousel();
      });
      document.getElementById("carousel-next").addEventListener("click", () => {
        carouselPage++;
        updateCarousel();
      });
      window.addEventListener("resize", updateCarousel);

      // ── Grid
      function renderGrid() {
        const query = currentSearch.toLowerCase();
        const grid = document.getElementById("packs-grid");
        const noResults = document.getElementById("no-results");
        const countEl = document.getElementById("pack-count");
        const titleEl = document.getElementById("section-title");
        const featuredSection = document.getElementById("mc-featured-section");

        grid.querySelectorAll(".pack-card-item").forEach((el) => el.remove());

        const filtered = PACKS.filter(
          (p) =>
            (!query || p.name.toLowerCase().includes(query)) &&
            (!currentCategory || p.category === currentCategory),
        );

        noResults.style.display = filtered.length === 0 ? "block" : "none";
        countEl.textContent = `${filtered.length} pack${filtered.length !== 1 ? "s" : ""}`;
        titleEl.textContent =
          currentCategory || (query ? "Search Results" : "All Packs");

        // Show/hide featured section
        const showFeatured = !query && !currentCategory;
        featuredSection.style.display = showFeatured ? "" : "none";

        filtered.forEach((pack) => {
          const a = document.createElement("a");
          a.className = "pack-card-item";
          a.href = `/id/?pack=${pack.uuid}`;
          // Set innerHTML first, then create img and prepend — avoids innerHTML += destroying the img ref
          a.innerHTML = `
            <div class="pack-banner-placeholder">No Banner</div>
            <div class="pack-card-footer">
              <div class="pack-card-name">${pack.name}</div>
              <div class="pack-card-sub">
                <span class="mc-cat-badge ${pack.category}">${pack.category}</span>
              </div>
            </div>`;
          const img = document.createElement("img");
          img.className = "pack-banner";
          img.alt = `${pack.name} for Minecraft Bedrock`;
          img.loading = "lazy";
          img.onerror = function () {
            this.style.display = "none";
            this.nextElementSibling.style.display = "flex";
          };
          a.insertBefore(img, a.firstChild);
          applyThumb(img, pack);
          grid.insertBefore(a, noResults);
        });

        // Also rebuild carousel with filtered packs when no featured
        if (!showFeatured) {
          carouselPage = 0;
        }
      }

      // ── Filter tabs
      document.querySelectorAll(".mc-filter-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".mc-filter-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          currentCategory = tab.dataset.cat;
          carouselPage = 0;
          renderGrid();
        });
      });

      // ── Search
      document.getElementById("search").addEventListener("input", (e) => {
        currentSearch = e.target.value.trim();
        carouselPage = 0;
        renderGrid();
      });

      // ── Init — load data from JSON, then preload thumbnails, then render
      loadData()
        .then(() => preloadThumbs())
        .then(() => {
          buildFeatured();
          const newlyAddedPacks = NEWLY_ADDED.map((entry) => {
            const pack = PACKS.find((p) => p.name === entry.name);
            return pack ? { ...pack, creator: entry.creator } : null;
          }).filter(Boolean);
          buildCarousel(newlyAddedPacks);
          renderGrid();
        });
    </script>
    <script src="../js/shared.js"></script>
    <script>
      initSharedComponents({ activePath: "/skinpacks/", starCount: 180 });
    </script>
  </body>
</html>
