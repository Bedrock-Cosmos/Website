    <style>
      :root {
        --mc-accent: #5b21b6;
      }

      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      .mc-main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* ── Videos content ── */
      .vid-content {
        flex: 1;
        padding: 2rem 2rem 3rem;
      }

      /* ── Page header ── */
      .vid-header {
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--mc-border);
      }
      .vid-header h1 {
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--mc-text);
        letter-spacing: 0.04em;
        margin-bottom: 4px;
      }
      .vid-header h1 em {
        font-style: normal;
        color: #8b5cf6;
        text-shadow: 0 0 30px rgba(91, 33, 182, 0.4);
      }
      .vid-header p {
        font-size: 0.82rem;
        color: var(--mc-muted);
      }

      /* ── Section label ── */
      .vid-section-label {
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--mc-muted);
        margin-bottom: 10px;
        padding: 0 2px;
      }
      .vid-section-label em {
        font-style: normal;
        color: #8b5cf6;
      }

      /* ── YouTube grid ── */
      .vp-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 4px;
        margin-bottom: 24px;
      }

      /* ── YouTube card ── */
      article.vp-card {
        background: var(--mc-panel);
        border: 2px solid #000;
        border-radius: 2px;
        overflow: hidden;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.15s;
        animation: vp-up 0.4s ease both;
      }
      @keyframes vp-up {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      article.vp-card:hover {
        border-color: var(--mc-accent);
        transform: translateY(-2px);
      }
      .vp-card a {
        display: block;
        text-decoration: none;
        color: inherit;
      }
      .vp-thumb {
        position: relative;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background: var(--mc-panel2);
      }
      .vp-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: filter 0.2s;
      }
      article.vp-card:hover .vp-thumb img {
        filter: brightness(1.12);
      }
      .vp-dur {
        position: absolute;
        bottom: 6px;
        right: 7px;
        background: rgba(0, 0, 0, 0.82);
        color: #fff;
        font-size: 0.67rem;
        font-weight: 700;
        padding: 0.12rem 0.38rem;
        border-radius: 2px;
        letter-spacing: 0.03em;
      }
      .vp-body {
        padding: 6px 8px 8px;
        background: var(--mc-panel2);
        border-top: 1px solid #000;
      }
      .vp-title {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--mc-text);
        line-height: 1.45;
        margin: 0 0 4px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .vp-body-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .vp-channel {
        font-size: 0.68rem;
        color: var(--mc-muted);
        margin: 0;
      }
      .vp-tag {
        font-size: 0.65rem;
        color: #8b5cf6;
        font-weight: 700;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      /* ── TikTok section ── */
      .tt-section {
        margin-top: 8px;
      }
      .tt-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 240px));
        gap: 4px;
      }
      article.tt-card {
        background: var(--mc-panel);
        border: 2px solid #000;
        border-radius: 2px;
        overflow: hidden;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.15s;
        animation: vp-up 0.4s ease both;
      }
      article.tt-card:hover {
        border-color: var(--mc-accent);
        transform: translateY(-2px);
      }
      article.tt-card a {
        display: block;
        text-decoration: none;
        color: inherit;
      }
      .tt-thumb {
        position: relative;
        aspect-ratio: 9 / 16;
        overflow: hidden;
        background: var(--mc-panel2);
      }
      .tt-thumb iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
        pointer-events: none;
      }
      .tt-thumb-cover {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        transition: background 0.2s;
        cursor: pointer;
      }
      article.tt-card:hover .tt-thumb-cover {
        background: rgba(91, 33, 182, 0.08);
      }
      .tt-play-icon {
        width: 44px;
        height: 44px;
        background: rgba(0, 0, 0, 0.65);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      article.tt-card:hover .tt-play-icon {
        background: var(--mc-accent);
        transform: scale(1.1);
      }
      .tt-play-icon svg {
        width: 18px;
        height: 18px;
        fill: #fff;
        margin-left: 2px;
      }
      .tt-body {
        padding: 6px 8px 8px;
        background: var(--mc-panel2);
        border-top: 1px solid #000;
      }
      .tt-title {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--mc-text);
        line-height: 1.4;
        margin: 0 0 4px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .tt-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .tt-creator {
        font-size: 0.68rem;
        color: var(--mc-muted);
      }
      .tt-platform {
        font-size: 0.65rem;
        color: #8b5cf6;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      /* ── Footer ── */
      footer {
        position: relative;
        z-index: 10;
      }
    </style>
  </head>
