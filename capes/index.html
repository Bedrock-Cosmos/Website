    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.4.1/bundles/skinview3d.bundle.js"></script>
    <script>
      // ═══════════════════════════════════════════════════════════
      //  CAPE DATA  — expand with your full list
      // ═══════════════════════════════════════════════════════════
      let PACKS = [];

      fetch("https://bedrock-cosmos.app/capes/capes.json")
        .then((r) => r.json())
        .then((data) => {
          PACKS = data;
          renderGrid();
          const uuidParam = new URLSearchParams(window.location.search).get(
            "cape",
          );
          const initialPack =
            (uuidParam && PACKS.find((p) => p.uuid === uuidParam)) ||
            PACKS[Math.floor(Math.random() * PACKS.length)];
          if (initialPack) selectCape(initialPack);
        })
        .catch((err) => console.error("Failed to load capes.json:", err));

      // ═══════════════════════════════════════════════════════════
      //  SKINVIEW3D VIEWER
      // ═══════════════════════════════════════════════════════════
      (function () {
        const canvas = document.getElementById("three-canvas");

        // skinview3d handles skin, outer layers, slim arms, cape, and animation
        const viewer = new skinview3d.SkinViewer({
          canvas: canvas,
          width: canvas.clientWidth || 320,
          height: canvas.clientHeight || 427,
          skin: "https://bedrock-cosmos.app/capes/Skin.png",
        });

        // Transparent background so our CSS gradient shows through
        viewer.renderer.setClearColor(0x000000, 0);

        // Walking animation
        viewer.animation = new skinview3d.WalkingAnimation();
        viewer.animation.speed = 0.6;

        viewer.autoRotate = false;

        // Face the back of the model (cape side) by rotating the camera 180° around Y
        viewer.camera.rotation.y = Math.PI;
        viewer.camera.position.set(32, 22, -42);

        // Zoom
        viewer.zoom = 0.9;

        // Allow mouse drag to rotate
        viewer.controls.enableRotate = true;
        viewer.controls.enableZoom = false;
        viewer.controls.enablePan = false;

        // Resize
        window.addEventListener("resize", () => {
          viewer.width = canvas.clientWidth || 320;
          viewer.height = canvas.clientHeight || 427;
        });

        let currentSkinUrl = "https://bedrock-cosmos.app/capes/Skin.png";
        let currentModel = "default";
        let currentBackEquipment = "cape";

        // ── Public APIs ──
        window.setCapeTexture = function (url) {
          if (!url) {
            viewer.loadCape(null);
            return;
          }
          viewer.loadCape(url, { backEquipment: currentBackEquipment });
        };

        window.setSkinTexture = function (url) {
          currentSkinUrl = url;
          viewer.loadSkin(url, { model: currentModel });
        };

        window.setSlimArms = function (slim) {
          currentModel = slim ? "slim" : "default";
          viewer.loadSkin(currentSkinUrl, { model: currentModel });
        };

        window.setBackEquipment = function (type) {
          currentBackEquipment = type; // 'cape' or 'elytra'
          // Re-apply to current cape URL if one is loaded
          if (currentCapeUrl)
            viewer.loadCape(currentCapeUrl, {
              backEquipment: currentBackEquipment,
            });
        };
      })();

      // ═══════════════════════════════════════════════════════════
      //  CAPE GRID UI
      // ═══════════════════════════════════════════════════════════
      const grid = document.getElementById("capes-grid"),
        noResults = document.getElementById("no-results"),
        searchEl = document.getElementById("search"),
        filterEl = document.getElementById("filter-category"),
        capeLabel = document.getElementById("cape-label"),
        equipBtn = document.getElementById("equip-btn");
      let selectedUUID = null;
      let currentCapeUrl = null;

      function selectCape(pack) {
        if (selectedUUID === pack.uuid) {
          selectedUUID = null;
          currentCapeUrl = null;
          window.setCapeTexture(null);
          capeLabel.innerHTML = "No cape selected";
          equipBtn.classList.remove("visible");
          grid
            .querySelectorAll(".cape-card")
            .forEach((c) => c.classList.remove("active"));
          history.replaceState(null, "", "/capes/");
          return;
        }
        selectedUUID = pack.uuid;
        currentCapeUrl = pack.texture;
        grid
          .querySelectorAll(".cape-card")
          .forEach((c) => c.classList.remove("active"));
        const card = grid.querySelector(`[data-uuid="${pack.uuid}"]`);
        if (card) card.classList.add("active");
        window.setCapeTexture(pack.texture);
        capeLabel.innerHTML = pack.creator
          ? `Previewing: <span>${pack.name}</span><br>By: <span>${pack.creator}</span>`
          : `Previewing: <span>${pack.name}</span>`;
        equipBtn.classList.add("visible");
        equipBtn.onclick = () => {
          const creatorSuffix = pack.creatorParam
            ? `/?creator=${encodeURIComponent(pack.creator)}`
            : "";
          location.href = `bedrockcosmos://showDressingRoomOffer?offerID=${pack.uuid}${creatorSuffix}`;
        };
        history.replaceState(null, "", `/capes/?cape=${pack.uuid}`);
      }

      function renderGrid() {
        const q = searchEl.value.trim().toLowerCase(),
          cat = filterEl.value;
        grid.querySelectorAll(".cape-card").forEach((el) => el.remove());
        const filtered = PACKS.filter(
          (p) =>
            (!q || p.name.toLowerCase().includes(q)) &&
            (!cat || p.category === cat),
        );
        noResults.style.display = filtered.length === 0 ? "block" : "none";
        filtered.forEach((pack) => {
          const card = document.createElement("div");
          card.className =
            "cape-card" + (selectedUUID === pack.uuid ? " active" : "");
          card.dataset.uuid = pack.uuid;
          card.innerHTML = `<div class="cape-img-wrap"><img src="${pack.icon}" alt="${pack.name}" loading="lazy" onerror="this.style.opacity='.15'"/></div><div class="cape-card-name">${pack.name}</div>`;
          card.addEventListener("click", () => selectCape(pack));
          grid.insertBefore(card, noResults);
        });
      }
      searchEl.addEventListener("input", renderGrid);
      filterEl.addEventListener("change", renderGrid);

      // ── Cape download ──
      function downloadCape() {
        if (!currentCapeUrl) {
          alert("Please select a cape first.");
          return;
        }
        const btn = document.getElementById("download-cape-btn");
        btn.textContent = "Downloading…";
        btn.disabled = true;
        fetch(currentCapeUrl)
          .then((r) => r.blob())
          .then((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            const capeName =
              (capeLabel.querySelector("span") || {}).textContent || "cape";
            a.download = capeName.replace(/[^a-z0-9_\-]/gi, "_") + ".png";
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
          })
          .catch(() => alert("Failed to download cape texture."))
          .finally(() => {
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="flex-shrink:0"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download`;
            btn.disabled = false;
          });
      }

      // ── Skin upload ──
      document
        .getElementById("skin-upload")
        .addEventListener("change", function () {
          const file = this.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (e) => window.setSkinTexture(e.target.result);
          reader.readAsDataURL(file);
        });

      // ── Classic / Slim toggle ──
      const btnClassic = document.getElementById("btn-classic");
      const btnSlim = document.getElementById("btn-slim");
      btnClassic.addEventListener("click", () => {
        btnClassic.classList.add("active");
        btnSlim.classList.remove("active");
        window.setSlimArms(false);
      });
      btnSlim.addEventListener("click", () => {
        btnSlim.classList.add("active");
        btnClassic.classList.remove("active");
        window.setSlimArms(true);
      });

      // ── Cape / Elytra toggle ──
      const btnCape = document.getElementById("btn-cape");
      const btnElytra = document.getElementById("btn-elytra");
      btnCape.addEventListener("click", () => {
        btnCape.classList.add("active");
        btnElytra.classList.remove("active");
        window.setBackEquipment("cape");
      });
      btnElytra.addEventListener("click", () => {
        btnElytra.classList.add("active");
        btnCape.classList.remove("active");
        window.setBackEquipment("elytra");
      });
    </script>
